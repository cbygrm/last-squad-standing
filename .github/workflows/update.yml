name: Update scores & deploy

# Re-fetches live World Cup results and redeploys the site so the leaderboard
# stays current automatically — no one has to do anything.
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (GitHub may delay during busy periods)
  push:
    branches: [main]
  workflow_dispatch:          # lets you trigger a refresh manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Don't pile up runs; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch latest scores
        run: node scripts/fetch.mjs
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
